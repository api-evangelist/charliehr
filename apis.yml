aid: charliehr
url: https://raw.githubusercontent.com/api-evangelist/charliehr/refs/heads/main/apis.yml
name: CharlieHR
kind: company
description: CharlieHR is a small-business HR platform that handles people management,
  time off, onboarding, and employee records. Its REST API exposes a company's team
  members, leave requests, leave allowances, and company structure (offices and teams)
  using OAuth 2.0 client credentials over HTTPS.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- HR
- HRIS
- People
- Leave
- Time Off
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
