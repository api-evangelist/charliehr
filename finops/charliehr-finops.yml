principles:
- name: Visibility
  description: Track the active headcount bracket and any add-ons against the monthly CharlieHR invoice.
- name: Allocation
  description: Map the company subscription and add-ons to the HR / People cost center.
- name: Optimization
  description: Right-size seats, archive offboarded team members promptly, and review whether Recruit / Advice add-ons are still needed.
- name: Accountability
  description: Assign an owner (typically People / Ops) to review the CharlieHR subscription tier monthly as headcount changes.
