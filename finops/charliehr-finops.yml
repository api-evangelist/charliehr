description: >-
  FinOps view of CharlieHR spend. CharlieHR bills a monthly subscription per
  company, stepped by team-member headcount bracket, plus optional add-ons
  (Charlie Recruit, Charlie Advice). The REST API is included with the platform
  subscription and is not separately metered, so the primary cost driver is
  headcount, not API usage. Prices are in GBP and exclude UK VAT (+20%).
notes: >-
  Pricing brackets and add-on rates change; verify against the CharlieHR pricing
  page during reconciliation. Because billing is headcount-based rather than
  usage-based, cost optimization centers on right-sizing seats and add-ons.
