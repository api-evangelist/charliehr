description: >-
  CharlieHR is priced per company on a headcount-based subscription rather than
  per API call. There is a single core HR platform plan whose monthly price
  steps up with the number of team members, plus optional add-ons (Charlie
  Recruit and Charlie Advice). The REST API is included with the platform
  subscription; access is governed by OAuth 2.0 credentials, not a separate API
  fee. Prices are in GBP and exclude UK VAT (+20%).
notes: >-
  Pricing tiers and amounts change; verify the current brackets, introductory
  offers, and VAT treatment on the CharlieHR pricing page during reconciliation.
  The 1-4 member bracket has been offered at an introductory rate for the first
  months before reverting to the standard rate.
sources:
- https://www.charliehr.com/pricing/
- https://www.charliehr.com/api_docs/
